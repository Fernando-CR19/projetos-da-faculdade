<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha</title>
    <link rel="stylesheet" href="./css/mudarSenha.css">
    <link rel="shortcut icon" type="imagex/png" href="./imgs/logo.png">
</head>

<body>
    <header class="header">
        <img src="./imgs/logo.png" class="img" alt="logo">
        <h1>BookVault</h1>
        <button class="btnVoltar">Voltar</button>
    </header>
    <div class="container">
        <form class="form">
            <fieldset class="fieldset">
                <h3>Redefinir Senha</h3>
                <label class="label labelNovaSenha">Nova senha:</label>
                <input type="text" class="input novaSenha">
                <label class="label labelRepetirNovaSenha">Repetir nova senha:</label>
                <input type="text" class="input repetirNovaSenha">
                <label class="label labelCodigoDeSeguranca">Código de segurança:</label>
                <input type="text" class="input codigoDeSeguranca">
                <div class="verificacao">
                    <input type="checkbox">
                    <label>Não sou um robô</label>
                </div>
                <button class="btn">Redefinir senha</button>
            </fieldset>
        </form>
    </div>
</body>

</html>
