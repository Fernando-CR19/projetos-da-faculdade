<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="shortcut icon" type="imagex/png" href="./imgs/logo.png">
</head>

<body>
    <header class="header">
        <img src="./imgs/logo.png" alt="logo">
        <h1>BookVault</h1>
    </header>
    <div class="formContainer">
        <form class="formulario">
            <fieldset>
                <h2>Login</h2>
                <img src="./imgs/user.png" alt="user" class="user">
                <div class="formEmail">
                    <label>E-mail:</label>
                    <input type="email">
                </div>
                <div class="formPassword">
                    <label>Senha:</label>
                    <input type="password">
                </div>
                <div class="formPassword codSeguranca">
                    <label>Código de segurança:</label>
                    <input type="password">
                </div>
                <div class="buttonContainer">
                    <button class="btn logar">Login</button>
                    <a href="./cadastrar.html" target="_blank"><button class="btn cadastrar">Cadastrar</button></a>
                </div>
                <a class="forgotPassword" href="./mudarSenha.html"><p>Esqueci minha senha</p></a>
            </fieldset>
        </form>
    </div>
</body>

</html>
